name: CI — ML

on:
  push:
    paths:
      - "ml/**"
      - "data/processed/potholes_yolo/**"
  pull_request:
    paths:
      - "ml/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install ruff
      - name: Lint
        run: ruff check ml/
