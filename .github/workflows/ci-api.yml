name: CI — API

on:
  push:
    paths:
      - "api/**"
      - "ml/src/**"
      - "pyproject.toml"
      - "requirements.txt"
  pull_request:
    paths:
      - "api/**"
      - "ml/src/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest api/tests/ -v
      - name: Lint
        run: ruff check api/ ml/src/
